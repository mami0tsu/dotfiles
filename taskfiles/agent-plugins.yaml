version: '3'

vars:
  agent_plugin_marketplace_name: mami0tsu
  agent_plugin_legacy_marketplace_name: dotfiles
  development_plugin_ref: 'development@{{.agent_plugin_marketplace_name}}'
  documentation_plugin_ref: 'documentation@{{.agent_plugin_marketplace_name}}'
  agent_plugin_legacy_ref: 'development@{{.agent_plugin_legacy_marketplace_name}}'
  agent_plugin_marketplace_dir: '{{.REPO_ROOT}}/agent-plugin-marketplace'
  development_plugin_dir: '{{.agent_plugin_marketplace_dir}}/plugins/development'
  documentation_plugin_dir: '{{.agent_plugin_marketplace_dir}}/plugins/documentation'

tasks:
  clean:
    desc: Unregister the shared agent plugin marketplace from Codex CLI and Claude Code.
    cmds:
      - task: codex:clean
      - task: claude:clean

  deploy:
    desc: Register the shared agent plugin marketplace in Codex CLI and Claude Code.
    cmds:
      - task: codex:deploy
      - task: claude:deploy

  validate:
    desc: Validate the shared agent plugin manifests with Claude Code.
    cmds:
      - task: claude:validate

  migrate:
    desc: Remove the legacy dotfiles agent plugin marketplace from Codex CLI and Claude Code.
    cmds:
      - task: codex:migrate
      - task: claude:migrate

  claude:clean:
    internal: true
    silent: true
    cmds:
      - claude plugin uninstall {{.development_plugin_ref}} --yes || true
      - claude plugin uninstall {{.documentation_plugin_ref}} --yes || true
      - claude plugin marketplace remove {{.agent_plugin_marketplace_name}} || true

  claude:deploy:
    internal: true
    silent: true
    cmds:
      - claude plugin marketplace add {{.agent_plugin_marketplace_dir}}
      - claude plugin install {{.development_plugin_ref}}
      - claude plugin install {{.documentation_plugin_ref}}

  claude:validate:
    internal: true
    silent: true
    cmds:
      - claude plugin validate {{.development_plugin_dir}} --strict
      - claude plugin validate {{.documentation_plugin_dir}} --strict
      - claude plugin validate {{.agent_plugin_marketplace_dir}} --strict

  claude:migrate:
    internal: true
    silent: true
    cmds:
      - claude plugin uninstall {{.agent_plugin_legacy_ref}} --yes || true
      - claude plugin marketplace remove {{.agent_plugin_legacy_marketplace_name}} || true

  codex:clean:
    internal: true
    silent: true
    cmds:
      - codex plugin remove {{.development_plugin_ref}} || true
      - codex plugin remove {{.documentation_plugin_ref}} || true
      - codex plugin marketplace remove {{.agent_plugin_marketplace_name}} || true

  codex:deploy:
    internal: true
    silent: true
    cmds:
      - codex plugin marketplace add {{.agent_plugin_marketplace_dir}}
      - codex plugin add {{.development_plugin_ref}}
      - codex plugin add {{.documentation_plugin_ref}}

  codex:migrate:
    internal: true
    silent: true
    cmds:
      - codex plugin remove {{.agent_plugin_legacy_ref}} || true
      - codex plugin marketplace remove {{.agent_plugin_legacy_marketplace_name}} || true
