[[plugins]]
repo = 'vim-denops/denops.vim'

[[plugins]]
repo = 'previm/previm'
hook_add = '''
  let g:previm_open_cmd = 'open -a Google\ Chrome'
'''

[[plugins]]
repo = 'mattn/vim-goimports'
on_ft = ['go']

[[plugins]]
repo = 'Shougo/deol.nvim'
on_source = ['ddu.vim']
hook_source =  '''
  let g:deol#external_history_path = '~/.zsh-history'
  let g:deol#prompt_pattern = '\w*>'
'''
