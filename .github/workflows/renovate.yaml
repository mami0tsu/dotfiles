---
name: Renovate

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜日 09:00 JST に実行する
    - cron: '0 0 * * 1'

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.repository }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          renovate-version: full
          token: ${{ steps.app-token.outputs.token }}
        env:
          # renovate.json の postUpgradeTasks で使う Nix hash 更新スクリプトだけを許可する
          RENOVATE_ALLOWED_COMMANDS: '["^\\.github/renovate-update-nix-hashes\\.sh$"]'
          # self-hosted Renovate では、このリポジトリの設定ファイルだけを実行対象にする
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: enabled
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
