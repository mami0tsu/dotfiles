version: '3'

vars:
  nix_target: '{{.TARGET | default (env "USER")}}'

env:
  SHELL: bash

set:
  - errexit
  - nounset
  - pipefail

tasks:
  default:
    silent: true
    cmds:
      - task --list

  deploy:
    desc: Deploy dotfiles using nix-darwin.
    cmds:
      - sudo darwin-rebuild switch --flake .#{{.nix_target}}

  clean:
    desc: Cleanup old Nix generations.
    cmds:
      - nix-collect-garbage -d
      - echo "Cleaned up old Nix generations. To fully free space, run with sudo."

  agent-skills:install:
    desc: Install global agent skills managed by APM.
    cmds:
      - task: _agent-skills:install
        vars:
          APM_ARGS: ""

  agent-skills:install:frozen:
    desc: Install global agent skills from the APM lockfile.
    cmds:
      - task: _agent-skills:install
        vars:
          APM_ARGS: "--frozen"

  agent-skills:update:
    desc: Update APM-managed global agent skills.
    cmds:
      - apm update --yes --target agent-skills
      - task: _agent-skills:install
        vars:
          APM_ARGS: ""

  _agent-skills:install:
    internal: true
    silent: true
    cmds:
      - rm -rf .agents/skills
      - apm install --target agent-skills --only apm {{.APM_ARGS}}
      - |
        if [[ ! -d .agents/skills ]]; then
          echo "No APM skills were installed into .agents/skills" >&2
          exit 1
        fi

        shopt -s nullglob

        for skill_dir in .agents/skills/*/; do
          skill_dir="${skill_dir%/}"
          skill_name="$(basename "$skill_dir")"

          if [[ -f "skills/${skill_name}/SKILL.md" ]]; then
            echo "Skill name collision: ${skill_name} exists in local skills/ and APM output" >&2
            exit 1
          fi
        done

        for agent_dir in "$HOME/.codex" "$HOME/.claude"; do
          mkdir -p "${agent_dir}/skills"

          for skill_dir in .agents/skills/*/; do
            skill_dir="${skill_dir%/}"
            skill_name="$(basename "$skill_dir")"
            target="${agent_dir}/skills/${skill_name}"

            rm -rf "$target"
            cp -R "$skill_dir" "$target"
          done
        done
